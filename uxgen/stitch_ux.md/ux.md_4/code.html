<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>World Creation: Pick Setting</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;color: #f8fafc;}
        .setting-card:hover {
            border-color: #3b82f6;box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            transform: translateY(-4px);
        }
        .setting-card.selected {
            border-color: #3b82f6;background-color: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-6">
<header class="w-full max-w-5xl mb-12">
<h1 class="text-3xl font-bold text-center mb-8 tracking-tight">Create Your World</h1>
<div class="relative w-full max-w-2xl mx-auto flex justify-between items-center mb-12">
<div class="absolute top-1/2 left-0 w-full h-1 bg-slate-800 -z-10 transform -translate-y-1/2 rounded"></div>
<div class="flex flex-col items-center">
<div class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-lg mb-2 shadow-lg shadow-blue-500/30 ring-4 ring-slate-900">
                    1
                </div>
<span class="text-sm font-medium text-blue-400">Setting</span>
</div>
<div class="flex flex-col items-center">
<div class="w-10 h-10 rounded-full bg-slate-800 text-slate-500 flex items-center justify-center font-bold text-lg mb-2 ring-4 ring-slate-900">
                    2
                </div>
<span class="text-sm font-medium text-slate-500">Tone</span>
</div>
<div class="flex flex-col items-center">
<div class="w-10 h-10 rounded-full bg-slate-800 text-slate-500 flex items-center justify-center font-bold text-lg mb-2 ring-4 ring-slate-900">
                    3
                </div>
<span class="text-sm font-medium text-slate-500">Details</span>
</div>
</div>
<div class="text-center">
<h2 class="text-2xl font-semibold mb-2 text-slate-200">Choose a Setting</h2>
<p class="text-slate-400">Select the foundation for your world. You can change this later.</p>
</div>
</header>
<main class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-3 gap-8">
<button class="setting-card group relative bg-slate-800 border-2 border-slate-700 rounded-2xl overflow-hidden transition-all duration-300 text-left flex flex-col h-[400px]">
<div class="h-48 w-full bg-slate-700 relative overflow-hidden">
<img alt="Medieval Castle" class="w-full h-full object-cover opacity-80 group-hover:scale-105 group-hover:opacity-100 transition-all duration-500" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD7c6kZ9eI0FFnB3LHqPoxxBhNaIbcGZj0303lQoTggDdWYVVZdSB4CnlMddpkcujbWcaOEJroX4Iu0JYazKNRaLKfloEdqjBHYE_J2gbunmEQpiRrG5omwxzyTsT_2px54znirC433QZlDBwN0cY2lvvlpydnE-8Xd1TJ2Q6F0nSZEOyrOouxxAd49YiuceFSvDhhnBOyo299gqm6Xx7vhWMpaYw8uJSHtvjIU4bclRWpegHv4egJ2edXAOlja5P6bARUt_VlgadBv"/>
<div class="absolute inset-0 bg-gradient-to-t from-slate-800 to-transparent"></div>
</div>
<div class="p-6 flex-grow flex flex-col justify-end relative z-10 -mt-12">
<div class="w-14 h-14 bg-amber-900/80 rounded-xl flex items-center justify-center mb-4 border border-amber-700/50 backdrop-blur-sm">
<span class="material-symbols-outlined text-3xl text-amber-400">castle</span>
</div>
<h3 class="text-2xl font-bold mb-2 text-white">Medieval Fantasy</h3>
<p class="text-slate-300 text-sm leading-relaxed">Swords, magic, ancient kingdoms, and mythical beasts roaming untamed lands.</p>
</div>
</button>
<button class="setting-card group relative bg-slate-800 border-2 border-slate-700 rounded-2xl overflow-hidden transition-all duration-300 text-left flex flex-col h-[400px]">
<div class="h-48 w-full bg-slate-700 relative overflow-hidden">
<img alt="Ruined City" class="w-full h-full object-cover opacity-80 group-hover:scale-105 group-hover:opacity-100 transition-all duration-500 grayscale group-hover:grayscale-0 sepia-[.2]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsVp9MUXasv8hZMFqRU47CYU3sqMSSsXjL6ptT-ZQW2QcuxaATK-1EW1l0yNzI0D85KN6kAs0zfR9vqZ2J-zazWzqAba8oG1qZjhfKoDSOTOnYsgPTnbxPruBy3DZrvOBITnnW2ncsOmfhDpb8MCjrqb6KV5ROEh0dvRWG2ZBrecLWIBmL4ktp3qLLIlpssRFzKFZWNhPVYq-gSV8nera89tLndhpc3h5FE9iWAx4f-y8UukuYpMgd40xcwCGvqJkUXEXLMq6yakNl"/>
<div class="absolute inset-0 bg-gradient-to-t from-slate-800 to-transparent"></div>
</div>
<div class="p-6 flex-grow flex flex-col justify-end relative z-10 -mt-12">
<div class="w-14 h-14 bg-emerald-900/80 rounded-xl flex items-center justify-center mb-4 border border-emerald-700/50 backdrop-blur-sm">
<span class="material-symbols-outlined text-3xl text-emerald-400">warning</span>
</div>
<h3 class="text-2xl font-bold mb-2 text-white">Post-Apocalyptic</h3>
<p class="text-slate-300 text-sm leading-relaxed">Ruin, survival, scarcity, and dangerous scavengers in a collapsed society.</p>
</div>
</button>
<button class="setting-card group relative bg-slate-800 border-2 border-slate-700 rounded-2xl overflow-hidden transition-all duration-300 text-left flex flex-col h-[400px]">
<div class="h-48 w-full bg-slate-700 relative overflow-hidden">
<img alt="Foggy City Street" class="w-full h-full object-cover opacity-80 group-hover:scale-105 group-hover:opacity-100 transition-all duration-500" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAdXB9sOMTn8EFyBO-vRaZuQrrxZUUlk51Rz6uUiKcnZYtw-dKRmwY47V0DWQwivFfNmTIoi35qDVbSg5PDaG7z0EcyZfzIdY4gTcfwJ075enULG_J0ndjG5SHi4-hc-j2WOwLg26NvqTLGzcJqi1Gn23Wv7BGMIeD9pCrd7g8-QnsVq81XlDhkgEubox1Cr1VCpGCy4AF3C0FCVxe6xjFlogci_DhQcmuk6YieqTmsjDMs0LZOaF5qVqSdM7g_qUJZ9wj_HIG3pYZU"/>
<div class="absolute inset-0 bg-gradient-to-t from-slate-800 to-transparent"></div>
</div>
<div class="p-6 flex-grow flex flex-col justify-end relative z-10 -mt-12">
<div class="w-14 h-14 bg-indigo-900/80 rounded-xl flex items-center justify-center mb-4 border border-indigo-700/50 backdrop-blur-sm">
<span class="material-symbols-outlined text-3xl text-indigo-400">search</span>
</div>
<h3 class="text-2xl font-bold mb-2 text-white">Modern Mystery</h3>
<p class="text-slate-300 text-sm leading-relaxed">Secrets, urban shadows, hidden conspiracies, and investigative tension.</p>
</div>
</button>
</main>
<footer class="w-full max-w-5xl mt-12 flex justify-between items-center px-4">
<button class="px-6 py-3 rounded-lg text-slate-400 hover:text-white font-medium transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-sm">arrow_back</span>
            Back
        </button>
<button class="px-8 py-3 rounded-lg bg-slate-700 text-slate-400 font-semibold cursor-not-allowed transition-colors flex items-center gap-2">
            Continue
            <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</footer>

</body></html>
